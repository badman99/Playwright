name: Playwright MCP Server

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '0 */4 * * *'

env:
  MCP_PORT: 3002
  STORAGE_PORT: 3003
  TERMINAL_PORT: 3004
  WEBDAV_PORT: 3005
  ROUTER_PORT: 8080
  SCREENSHOTS_DIR: /tmp/storage/screenshots
  UPLOADS_DIR: /tmp/storage/uploads

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          echo "📦 Installing tools..."
          npm install -g @playwright/mcp@latest
          npx @playwright/mcp install-browser chromium
          npx playwright install-deps chromium

          # terminal-mcp-server + mcp-proxy
          echo "🖥️ Installing terminal-mcp-server..."
          git clone https://github.com/weidwonder/terminal-mcp-server.git /tmp/terminal-mcp
          cd /tmp/terminal-mcp && npm install && npm run build
          cd -
          pip install mcp-proxy

          # rclone (WebDAV server ke liye)
          echo "☁️ Installing rclone..."
          curl -s https://rclone.org/install.sh | sudo bash
          echo "✅ rclone $(rclone --version | head -1) ready!"

          # bore.pub install
          echo "📥 Downloading bore..."
          curl -sL "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz" -o bore.tar.gz
          tar -xzf bore.tar.gz && chmod +x bore && sudo mv bore /usr/local/bin/
          echo "✅ All dependencies ready!"

      - name: Create storage directories
        run: |
          mkdir -p $SCREENSHOTS_DIR $UPLOADS_DIR
          echo "✅ Storage dirs ready!"

      - name: Start Playwright MCP
        env:
          PLAYWRIGHT_MCP_BROWSER: chromium
          PLAYWRIGHT_MCP_HEADLESS: true
          PLAYWRIGHT_MCP_USER_AGENT: "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36"
        run: |
          echo "🎭 Starting Playwright MCP on :$MCP_PORT..."
          npx @playwright/mcp@latest \
            --config stealth-config.json \
            --headless \
            --port $MCP_PORT \
            --host 127.0.0.1 \
            --isolated \
            --no-sandbox \
            --allowed-origins '*' \
            --allowed-hosts '*' \
            --output-dir $SCREENSHOTS_DIR \
            > /tmp/mcp.log 2>&1 &

          # Wait for MCP
          for i in {1..30}; do
            nc -z localhost $MCP_PORT 2>/dev/null && echo "✅ MCP ready!" && break
            [ $i -eq 30 ] && echo "❌ MCP failed!" && cat /tmp/mcp.log && exit 1
            sleep 2
          done

      - name: Start Storage Server
        run: |
          echo "📁 Starting storage server on :$STORAGE_PORT..."
          STORAGE_PORT=$STORAGE_PORT STORAGE_ROOT=/tmp/storage \
          node scripts/storage-server.js > /tmp/storage.log 2>&1 &
          sleep 3
          if curl -sf http://localhost:$STORAGE_PORT/health > /dev/null; then
            echo "✅ Storage server ready!"
          else
            echo "❌ Storage server failed!"
            cat /tmp/storage.log
            exit 1
          fi

      - name: Start Terminal MCP
        run: |
          echo "🖥️ Starting terminal MCP on :3004 via mcp-proxy..."
          mcp-proxy \
            --port 3004 \
            --host 0.0.0.0 \
            --allow-origin '*' \
            -- node /tmp/terminal-mcp/build/index.js \
            > /tmp/terminal.log 2>&1 &
          sleep 4
          if nc -z localhost 3004; then
            echo "✅ Terminal MCP ready!"
          else
            echo "❌ Terminal MCP failed!"
            cat /tmp/terminal.log
            exit 1
          fi

      - name: Start WebDAV Server
        run: |
          echo "📂 Starting rclone WebDAV server on :$WEBDAV_PORT (serving /)..."
          rclone serve webdav / \
            --addr 127.0.0.1:$WEBDAV_PORT \
            --allow-origin '*' \
            --no-checksum \
            --vfs-links \
            --vfs-cache-mode full \
            --dir-cache-time 10s \
            > /tmp/webdav.log 2>&1 &
          sleep 3
          nc -z localhost $WEBDAV_PORT \
            && echo "✅ WebDAV server ready!" \
            || (echo "⚠️ WebDAV issue:" && cat /tmp/webdav.log)

      - name: Start Local Router
        run: |
          echo "🚦 Starting router on :$ROUTER_PORT..."
          node scripts/router.js > /tmp/router.log 2>&1 &
          sleep 2
          curl -sf http://localhost:$ROUTER_PORT/health > /dev/null && echo "✅ Router ready!" || (cat /tmp/router.log && exit 1)

      - name: Start bore.pub Tunnel + Watchdog
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: |
          # ─── Service Restart Functions ─────────────────────────────
          restart_mcp() {
            echo "🔄 Restarting Playwright MCP on :$MCP_PORT..."
            fuser -k $MCP_PORT/tcp 2>/dev/null || true
            sleep 1
            PLAYWRIGHT_MCP_BROWSER=chromium PLAYWRIGHT_MCP_HEADLESS=true \
            PLAYWRIGHT_MCP_USER_AGENT="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
            npx @playwright/mcp@latest \
              --config stealth-config.json \
              --headless \
              --port $MCP_PORT \
              --host 127.0.0.1 \
              --isolated \
              --no-sandbox \
              --allowed-origins '*' \
              --allowed-hosts '*' \
              --output-dir $SCREENSHOTS_DIR \
              > /tmp/mcp.log 2>&1 &
            for i in $(seq 1 15); do
              nc -z localhost $MCP_PORT 2>/dev/null && echo "✅ MCP restarted!" && return 0
              sleep 2
            done
            echo "❌ MCP restart failed!"
            return 1
          }

          restart_storage() {
            echo "🔄 Restarting Storage Server on :$STORAGE_PORT..."
            fuser -k $STORAGE_PORT/tcp 2>/dev/null || true
            sleep 1
            STORAGE_PORT=$STORAGE_PORT STORAGE_ROOT=/tmp/storage \
            node scripts/storage-server.js > /tmp/storage.log 2>&1 &
            for i in $(seq 1 10); do
              curl -sf http://localhost:$STORAGE_PORT/health > /dev/null 2>&1 && echo "✅ Storage restarted!" && return 0
              sleep 2
            done
            echo "❌ Storage restart failed!"
            return 1
          }

          restart_terminal() {
            echo "🔄 Restarting Terminal MCP on :$TERMINAL_PORT..."
            fuser -k $TERMINAL_PORT/tcp 2>/dev/null || true
            sleep 1
            mcp-proxy \
              --port $TERMINAL_PORT \
              --host 0.0.0.0 \
              --allow-origin '*' \
              -- node /tmp/terminal-mcp/build/index.js \
              > /tmp/terminal.log 2>&1 &
            for i in $(seq 1 10); do
              nc -z localhost $TERMINAL_PORT 2>/dev/null && echo "✅ Terminal restarted!" && return 0
              sleep 2
            done
            echo "❌ Terminal restart failed!"
            return 1
          }

          restart_webdav() {
            echo "🔄 Restarting WebDAV on :$WEBDAV_PORT..."
            fuser -k $WEBDAV_PORT/tcp 2>/dev/null || true
            sleep 1
            rclone serve webdav / \
              --addr 127.0.0.1:$WEBDAV_PORT \
              --allow-origin '*' \
              --no-checksum \
              --vfs-links \
              --vfs-cache-mode full \
              --dir-cache-time 10s \
              > /tmp/webdav.log 2>&1 &
            for i in $(seq 1 10); do
              nc -z localhost $WEBDAV_PORT 2>/dev/null && echo "✅ WebDAV restarted!" && return 0
              sleep 2
            done
            echo "❌ WebDAV restart failed!"
            return 1
          }

          restart_router() {
            echo "🔄 Restarting Router on :$ROUTER_PORT..."
            fuser -k $ROUTER_PORT/tcp 2>/dev/null || true
            sleep 1
            node scripts/router.js > /tmp/router.log 2>&1 &
            for i in $(seq 1 10); do
              curl -sf http://localhost:$ROUTER_PORT/health > /dev/null 2>&1 && echo "✅ Router restarted!" && return 0
              sleep 2
            done
            echo "❌ Router restart failed!"
            return 1
          }

          register_worker() {
            echo "📡 Registering tunnel with Worker: $1"
            RESP=$(curl -sf -X POST "$WORKER_URL/register" \
              -H "Content-Type: application/json" \
              -H "X-Auth-Token: $AUTH_TOKEN" \
              -d "{\"tunnelUrl\": \"$1\"}" 2>&1) || true
            echo "   Worker response: $RESP"
          }

          print_banner() {
            echo ""
            echo "╔══════════════════════════════════════════════════╗"
            echo "║  🌐 TUNNEL:    $1"
            echo "╠══════════════════════════════════════════════════╣"
            echo "║  🎭 MCP:      $WORKER_URL/playwright/sse"
            echo "║  🖥️ Terminal: $WORKER_URL/terminal/sse"
            echo "║  📁 Storage:  $WORKER_URL/storage/"
            echo "║  📂 WebDAV:   $WORKER_URL/storage-dav/"
            echo "╚══════════════════════════════════════════════════╝"
            echo ""
          }

          # ─── Start bore.pub ──────────────────────────────────────
          start_bore() {
            echo "🌐 Starting bore.pub tunnel on router (:$ROUTER_PORT)..."
            rm -f /tmp/bore.log
            bore local $ROUTER_PORT --to bore.pub > /tmp/bore.log 2>&1 &
            BORE_PID=$!
            sleep 5

            BORE_URL=$(grep -oE 'bore\.pub:[0-9]+' /tmp/bore.log | head -1)
            if [ -z "$BORE_URL" ]; then
              echo "❌ bore.pub URL nahi mili!"
              cat /tmp/bore.log
              return 1
            fi

            TUNNEL_URL="http://$BORE_URL"
            print_banner "$TUNNEL_URL"
            register_worker "$TUNNEL_URL"
            echo "✅ Runner registered!"
          }

          # ─── Initial bore start ───────────────────────────────────
          start_bore || exit 1

          # ─── Watchdog Loop (every 5 sec) ─────────────────────────
          echo "🐶 Watchdog started — monitoring every 5 seconds..."
          while true; do
            sleep 5

            # --- Check all service ports ---
            if ! nc -z localhost $MCP_PORT 2>/dev/null; then
              echo "⚠️ $(date) — MCP :$MCP_PORT down! Restarting..."
              restart_mcp
            fi

            if ! curl -sf http://localhost:$STORAGE_PORT/health > /dev/null 2>&1; then
              echo "⚠️ $(date) — Storage :$STORAGE_PORT down! Restarting..."
              restart_storage
            fi

            if ! nc -z localhost $TERMINAL_PORT 2>/dev/null; then
              echo "⚠️ $(date) — Terminal :$TERMINAL_PORT down! Restarting..."
              restart_terminal
            fi

            if ! nc -z localhost $WEBDAV_PORT 2>/dev/null; then
              echo "⚠️ $(date) — WebDAV :$WEBDAV_PORT down! Restarting..."
              restart_webdav
            fi

            if ! curl -sf http://localhost:$ROUTER_PORT/health > /dev/null 2>&1; then
              echo "⚠️ $(date) — Router :$ROUTER_PORT down! Restarting..."
              restart_router
            fi

            # --- Check bore.pub tunnel via external health ---
            if ! kill -0 $BORE_PID 2>/dev/null; then
              echo "🔴 $(date) — bore.pub process died! Reconnecting..."
              start_bore || {
                echo "❌ bore reconnection failed! Retrying in 10s..."
                sleep 10
                continue
              }
              continue
            fi

            BORE_URL=$(grep -oE 'bore\.pub:[0-9]+' /tmp/bore.log | head -1)
            if [ -n "$BORE_URL" ]; then
              TUNNEL_CHECK="http://$BORE_URL"
              if ! curl -sf --max-time 8 "$TUNNEL_CHECK/health" > /dev/null 2>&1; then
                echo "🔴 $(date) — Tunnel health check failed! Reconnecting bore..."
                kill $BORE_PID 2>/dev/null || true
                sleep 2
                start_bore || {
                  echo "❌ bore reconnection failed! Retrying in 10s..."
                  sleep 10
                  continue
                }
                continue
              fi
            fi

            # --- Periodic re-register every 30 min ---
            NOW=$(date +%s)
            LAST_REGISTER=${LAST_REGISTER:-$NOW}
            if [ $((NOW - LAST_REGISTER)) -ge 1800 ]; then
              echo "🔄 $(date) — Periodic re-register..."
              register_worker "$TUNNEL_URL"
              LAST_REGISTER=$NOW
            fi
          done
