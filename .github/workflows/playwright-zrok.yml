name: Playwright MCP Server

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '0 */4 * * *'

env:
  ZROK_TOKEN: jphzLUZd8sIM
  PORT: 3002
  NAME: playwright-mcp-gha

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install zrok
        run: |
          echo "📥 Downloading zrok v2.0.4..."
          curl -sL "https://github.com/openziti/zrok/releases/download/v2.0.4/zrok_2.0.4_linux_amd64.tar.gz" -o zrok.tar.gz
          tar -xzf zrok.tar.gz
          mv zrok2 zrok
          chmod +x zrok
          sudo mv zrok /usr/local/bin/

      - name: Enable zrok
        run: |
          zrok enable $ZROK_TOKEN --headless

      - name: Create reserved name (if not exists)
        run: |
          zrok create name -n public $NAME || echo "Name already exists or using default"

      - name: Install Playwright
        run: |
          npm install -g @playwright/mcp@latest
          npx playwright install chromium

      - name: Start MCP Server + zrok Tunnel
        run: |
          # Start MCP server in background
          npx @playwright/mcp@latest --headless --port $PORT --host 0.0.0.0 > mcp.log 2>&1 &
          MCP_PID=$!
          
          # Wait for MCP to be ready
          for i in {1..30}; do
            if curl -s http://localhost:$PORT > /dev/null 2>&1; then
              echo "✅ MCP server ready on port $PORT"
              break
            fi
            sleep 1
          done
          
          # Check if MCP started
          if ! kill -0 $MCP_PID 2>/dev/null; then
            echo "❌ MCP server failed to start"
            cat mcp.log
            exit 1
          fi
          
          # Start zrok tunnel with RESERVED name (static URL!)
          echo "🌐 Starting zrok tunnel with reserved name: $NAME"
          zrok share public localhost:$PORT -n public:$NAME > zrok.log 2>&1 &
          ZROK_PID=$!
          
          # Wait and extract URL
          sleep 8
          ZROK_URL=$(grep -oE '[a-zA-Z0-9\-]+\.share\.zrok\.io|[a-zA-Z0-9\-]+\.shares\.zrok\.io' zrok.log | head -1)
          
          if [ -n "$ZROK_URL" ]; then
            echo ""
            echo "========================================"
            echo "🚀 MCP SERVER LIVE AT:"
            echo "https://$ZROK_URL"
            echo "========================================"
            echo ""
          else
            echo "⚠️ Could not extract zrok URL, showing logs:"
            cat zrok.log
            # Try to guess the URL pattern
            echo "Expected URL: https://${NAME}.share.zrok.io or similar"
          fi
          
          # Keep both processes alive
          while kill -0 $MCP_PID 2>/dev/null; do
            if ! kill -0 $ZROK_PID 2>/dev/null; then
              echo "⚠️ zrok tunnel died, restarting..."
              zrok share public localhost:$PORT -n public:$NAME > zrok.log 2>&1 &
              ZROK_PID=$!
              sleep 5
            fi
            sleep 60
            echo "⏳ $(date) - Server running..."
          done
          
          echo "❌ MCP server died. Log:"
          cat mcp.log
          exit 1
