name: Keep-Alive Ping

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:  # Manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Playwright MCP Server
        run: |
          # Replace with your actual Codespace URL
          # Or use a secret: ${{ secrets.PLAYWRIGHT_URL }}
          URL="${{ vars.PLAYWRIGHT_URL || 'https://your-default-url.app.github.dev' }}"
          
          echo "Pinging $URL..."
          curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "Ping failed (server might be down)"
          
          # Optional: Log timestamp
          echo "Ping completed at $(date)"
